    <g stroke="#dbe4f0" stroke-width="2">
      <line x1="40" y1="80" x2="470" y2="80"/><line x1="40" y1="125" x2="470" y2="125"/><line x1="40" y1="170" x2="470" y2="170"/><line x1="40" y1="215" x2="470" y2="215"/>
    </g>
    <path d="M45 205 C95 170, 130 190, 170 145 S250 105, 300 132 S390 78, 465 102" fill="none" stroke="#2456d3" stroke-width="7" stroke-linecap="round"/>
