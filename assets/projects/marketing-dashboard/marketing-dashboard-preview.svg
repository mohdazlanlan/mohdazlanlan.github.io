  <text x="90" y="130" fill="#64748b" font-family="Inter,Arial,sans-serif" font-size="17">Power BI sales, platform, region, product and customer feedback analysis</text>
  <g font-family="Inter,Arial,sans-serif">
    <rect x="90" y="165" width="230" height="90" rx="16" fill="#f8fafc" stroke="#dbe4f0"/>
